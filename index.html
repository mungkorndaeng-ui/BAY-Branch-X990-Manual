<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Sign-on (ลงชื่อเข้าใช้งาน)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;900&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #ffffff; font-family: 'Noto Sans Thai', sans-serif; padding: 36px 24px 48px; }
.header { text-align: center; margin-bottom: 40px; }
.brand-pill { display: inline-flex; align-items: center; gap: 10px; background: #FFD700;
  border-radius: 50px; padding: 8px 22px; margin-bottom: 16px; }
.brand-pill .dot { width: 10px; height: 10px; border-radius: 50%; background: #2d1e00; }
.brand-pill span { font-weight: 900; font-size: 15px; color: #2d1e00; }
.header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.header .bar { width: 48px; height: 3px; background: #FFD700; border-radius: 2px; margin: 10px auto 0; }
.grid { display: grid; grid-template-columns: repeat(4, 165px); gap: 40px 24px;
  justify-content: center; max-width: 820px; margin: 0 auto; }
.phone-card { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 165px; }

/* ── X990 Verifone Frame ── */
.x990-frame {
  width: 148px;
  background: #1c1c1e;
  border: 2.5px solid #3a3a3c;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}
.top-bezel {
  background: #1c1c1e;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.camera-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #555;
  box-shadow: 0 0 0 1.5px #333;
}
/* Screen: exact pixel ratio match — image is pre-cropped 308x480, displayed at 138px wide */
.screen-wrap {
  width: 100%;
  height: 215px;
  overflow: hidden;
  background: #fff;
  flex-shrink: 0;
}
.screen-wrap img {
  width: 100%;
  height: 100%;
  object-fit: fill;   /* image is pre-cropped to exact ratio — fill with no distortion */
  display: block;
}
.soft-bar {
  background: #111;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: space-evenly;
  padding: 0 10px;
  flex-shrink: 0;
}
.soft-btn {
  color: #c8c8c8;
  font-size: 11px;
  opacity: 0.85;
}
.bottom-chin {
  background: #1c1c1e;
  height: 10px;
  flex-shrink: 0;
}
.step-desc { color: #222; font-size: 13px; font-weight: 600;
  text-align: center; line-height: 1.55; max-width: 155px; }
.step-num { font-family: 'IBM Plex Mono', monospace; font-weight: 700;
  color: #222; font-size: 13px; }
</style>
</head>
